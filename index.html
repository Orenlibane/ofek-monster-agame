<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>מאלף המפלצות של אופק</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0a0a12;
            font-family: 'Heebo', 'Courier New', monospace;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* Background gradient */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(30,20,80,0.4) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(60,20,40,0.3) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 100%, rgba(10,30,60,0.5) 0%, transparent 60%),
                linear-gradient(180deg, #0a0a12 0%, #12101e 50%, #0a0a12 100%);
            z-index: -1;
        }

        #gameWrapper {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            padding: 8px;
        }

        #gameCanvas {
            display: block;
            border: 2px solid rgba(100,120,200,0.3);
            border-radius: 12px;
            box-shadow:
                0 0 40px rgba(60,80,180,0.15),
                0 0 80px rgba(40,20,100,0.1),
                inset 0 0 30px rgba(0,0,0,0.3);
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        /* Mobile D-pad overlay */
        #mobileControls {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 200px;
            pointer-events: none;
            z-index: 100;
        }

        .dpad {
            position: absolute;
            left: 20px;
            bottom: 20px;
            width: 150px;
            height: 150px;
            pointer-events: auto;
        }
        .dpad-btn {
            position: absolute;
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.12);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 22px;
            color: rgba(255,255,255,0.6);
            -webkit-tap-highlight-color: transparent;
            transition: background 0.1s;
        }
        .dpad-btn:active {
            background: rgba(255,255,255,0.3);
        }
        .dpad-up    { top: 0;   left: 50px; }
        .dpad-down  { bottom: 0; left: 50px; }
        .dpad-left  { top: 50px; left: 0; }
        .dpad-right { top: 50px; right: 0; }

        .action-btns {
            position: absolute;
            right: 20px;
            bottom: 20px;
            display: flex;
            gap: 12px;
            pointer-events: auto;
        }
        .action-btn {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: rgba(255,255,255,0.12);
            border: 2px solid rgba(255,255,255,0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            font-weight: bold;
            color: rgba(255,255,255,0.7);
            -webkit-tap-highlight-color: transparent;
            transition: background 0.1s;
        }
        .action-btn:active {
            background: rgba(255,255,255,0.3);
        }
        .btn-confirm { border-color: rgba(100,200,100,0.4); color: rgba(100,220,100,0.8); }
        .btn-cancel  { border-color: rgba(200,100,100,0.4); color: rgba(220,100,100,0.8); }

        .top-btns {
            position: absolute;
            right: 20px;
            bottom: 100px;
            display: flex;
            gap: 8px;
            pointer-events: auto;
        }
        .top-btn {
            width: 44px;
            height: 36px;
            border-radius: 8px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 11px;
            color: rgba(255,255,255,0.5);
            -webkit-tap-highlight-color: transparent;
        }
        .top-btn:active {
            background: rgba(255,255,255,0.2);
        }

        /* Show mobile controls on touch devices */
        @media (hover: none) and (pointer: coarse) {
            #mobileControls {
                display: block;
            }
            #gameWrapper {
                height: calc(100% - 180px);
                padding: 4px;
            }
        }

        /* Small screens */
        @media (max-width: 600px) {
            #gameCanvas {
                border-radius: 6px;
                border-width: 1px;
            }
        }

        /* Landscape on mobile */
        @media (max-height: 500px) and (hover: none) {
            #mobileControls {
                height: 140px;
            }
            .dpad { width: 120px; height: 120px; bottom: 10px; left: 10px; }
            .dpad-btn { width: 40px; height: 40px; font-size: 18px; }
            .dpad-up    { left: 40px; }
            .dpad-down  { left: 40px; }
            .dpad-right { right: 0; top: 40px; }
            .dpad-left  { top: 40px; }
            .action-btns { right: 10px; bottom: 10px; }
            .action-btn { width: 46px; height: 46px; font-size: 12px; }
            .top-btns { right: 10px; bottom: 75px; }
            .top-btn { width: 36px; height: 30px; font-size: 10px; }
            #gameWrapper {
                height: calc(100% - 130px);
            }
        }
    </style>
</head>
<body>
    <div id="gameWrapper">
        <canvas id="gameCanvas"></canvas>
    </div>

    <!-- Mobile touch controls -->
    <div id="mobileControls">
        <div class="dpad">
            <div class="dpad-btn dpad-up" data-key="ArrowUp">&#9650;</div>
            <div class="dpad-btn dpad-down" data-key="ArrowDown">&#9660;</div>
            <div class="dpad-btn dpad-left" data-key="ArrowLeft">&#9664;</div>
            <div class="dpad-btn dpad-right" data-key="ArrowRight">&#9654;</div>
        </div>
        <div class="top-btns">
            <div class="top-btn" data-key="p">P</div>
            <div class="top-btn" data-key="s">S</div>
            <div class="top-btn" data-key="d">D</div>
            <div class="top-btn" data-key="c">C</div>
        </div>
        <div class="action-btns">
            <div class="action-btn btn-cancel" data-key="Escape">ESC</div>
            <div class="action-btn btn-confirm" data-key="z">OK</div>
        </div>
    </div>

    <!-- Load order matters: dependencies first -->
    <script src="constants.js"></script>
    <script src="monsters.js"></script>
    <script src="player.js"></script>
    <script src="world.js"></script>
    <script src="sprites.js"></script>
    <script src="animations.js"></script>
    <script src="battle.js"></script>
    <script src="ui.js"></script>
    <script src="game.js"></script>

    <script>
    // Responsive canvas sizing
    function resizeCanvas() {
        const canvas = document.getElementById('gameCanvas');
        if (!canvas) return;
        const wrapper = document.getElementById('gameWrapper');
        const ww = wrapper.clientWidth;
        const wh = wrapper.clientHeight;
        const aspect = 960 / 720; // 4:3

        let displayW, displayH;
        if (ww / wh > aspect) {
            displayH = wh;
            displayW = Math.floor(wh * aspect);
        } else {
            displayW = ww;
            displayH = Math.floor(ww / aspect);
        }

        canvas.style.width = displayW + 'px';
        canvas.style.height = displayH + 'px';
    }

    window.addEventListener('resize', resizeCanvas);
    window.addEventListener('DOMContentLoaded', () => {
        resizeCanvas();
        // Re-check after fonts load
        setTimeout(resizeCanvas, 200);
    });

    // Mobile touch controls
    document.querySelectorAll('[data-key]').forEach(btn => {
        function fireKey(key) {
            document.dispatchEvent(new KeyboardEvent('keydown', { key: key, bubbles: true }));
        }
        btn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            fireKey(btn.dataset.key);
        }, { passive: false });
        btn.addEventListener('mousedown', (e) => {
            e.preventDefault();
            fireKey(btn.dataset.key);
        });
    });

    // Prevent pull-to-refresh on mobile
    document.addEventListener('touchmove', (e) => { e.preventDefault(); }, { passive: false });
    </script>
</body>
</html>
